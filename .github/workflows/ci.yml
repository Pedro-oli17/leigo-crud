name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: pip install flake8

      - name: Rodar lint
        run: flake8 app

      - name: Build imagem Docker
        run: docker build -t leigo-crud:latest .